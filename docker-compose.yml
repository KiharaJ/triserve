# TriServe local development stack: MySQL 8 + Adminer.
# Copy .env.example -> .env to override the defaults below.
services:
  mysql:
    image: mysql:8.0
    container_name: triserve-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-triserve_root_dev}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-triserve}
      MYSQL_USER: ${MYSQL_USER:-triserve}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-triserve_dev}
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-p${MYSQL_ROOT_PASSWORD:-triserve_root_dev}']
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:latest
    container_name: triserve-adminer
    ports:
      - '${ADMINER_PORT:-8080}:8080'
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
